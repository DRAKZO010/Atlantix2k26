<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantix 2k26 - Gatekeeper</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --card: #1a1a1a; --success: #00ff88; --error: #ff4d4d; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid var(--primary) !important; margin-bottom: 20px; }
        .status-box { padding: 20px; border-radius: 12px; margin-top: 20px; display: none; border: 1px solid #333; background: var(--card); }
        .status-box .status-icon { font-size: 3rem; margin-bottom: 10px; }
        .status-box .status-name { font-size: 1.3rem; font-weight: 700; margin: 5px 0; }
        .status-box .status-detail { font-size: 0.9rem; opacity: 0.8; }
        .success { border-color: var(--success); color: var(--success); }
        .error { border-color: var(--error); color: var(--error); }
        .warning { border-color: #ffaa00; color: #ffaa00; }
        input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; width: 70%; margin-top: 10px; }
        button { background: var(--primary); color: black; border: none; padding: 12px 24px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .manual-section { margin-top: 40px; border-top: 1px solid #333; padding-top: 20px; }
        .scan-again-btn { display: none; margin-top: 20px; padding: 14px 32px; font-size: 1rem; background: var(--primary); color: black; }
        .scan-count { color: var(--primary); font-size: 0.85rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-family: 'Orbitron'; color: var(--primary);">GATEKEEPER</h1>
        <p>Scan participant QR code for entry</p>
        <div class="scan-count" id="scanCount">Scanned: 0</div>
        
        <div id="reader"></div>
        <div id="statusBox" class="status-box"></div>
        <button class="scan-again-btn" id="scanAgainBtn" onclick="scanAnother()">Scan Another Pass</button>

        <div class="manual-section">
            <p>Can't scan? Enter ID manually:</p>
            <input type="text" id="manualId" placeholder="e.g. AUTO123456">
            <button onclick="checkManual()">CHECK</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQKLM92UMnSb_ZLd7BZGgH6TNP9ugXffg",
            authDomain: "atlantix2k26.firebaseapp.com",
            projectId: "atlantix2k26",
            storageBucket: "atlantix2k26.firebasestorage.app",
            messagingSenderId: "988770007742",
            appId: "1:988770007742:web:742114c6f386a0422fbcef"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let scanCountNum = 0;
        let html5QrcodeScanner = null;
        let lastScannedId = null;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.addEventListener('click', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });
        document.addEventListener('touchstart', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });

        function playBeep(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;

            if (type === 'success') {
                const osc1 = audioCtx.createOscillator();
                const g1 = audioCtx.createGain();
                osc1.connect(g1); g1.connect(audioCtx.destination);
                osc1.frequency.value = 880; g1.gain.value = 0.4;
                osc1.start(now); osc1.stop(now + 0.12);

                const osc2 = audioCtx.createOscillator();
                const g2 = audioCtx.createGain();
                osc2.connect(g2); g2.connect(audioCtx.destination);
                osc2.frequency.value = 1100; g2.gain.value = 0.4;
                osc2.start(now + 0.13); osc2.stop(now + 0.28);
            } else if (type === 'warning') {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.connect(g); g.connect(audioCtx.destination);
                osc.frequency.value = 600; g.gain.value = 0.4;
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'error') {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.connect(g); g.connect(audioCtx.destination);
                osc.frequency.value = 300; g.gain.value = 0.4;
                osc.start(now); osc.stop(now + 0.35);
            }
        }

        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear();
            }
        }

        function startScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            html5QrcodeScanner.render((decodedText) => {
                if (decodedText === lastScannedId) return;
                lastScannedId = decodedText;
                verifyEntry(decodedText);
            });
        }

        async function verifyEntry(regId) {
            const statusBox = document.getElementById('statusBox');
            const scanAgainBtn = document.getElementById('scanAgainBtn');
            statusBox.style.display = "block";
            statusBox.innerHTML = "Processing...";
            statusBox.className = "status-box";
            scanAgainBtn.style.display = "none";

            try {
                const cleanId = regId.trim();
                const docRef = doc(db, "registrations", cleanId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.checkedIn) {
                        playBeep('warning');
                        scanCountNum++;
                        document.getElementById('scanCount').textContent = `Scanned: ${scanCountNum}`;
                        statusBox.classList.add('warning');
                        statusBox.innerHTML = `
                            <div class="status-icon">⚠️</div>
                            <div class="status-name">ALREADY CHECKED IN</div>
                            <div class="status-detail"><b>${data.teamLead}</b></div>
                            <div class="status-detail">ID: ${cleanId}</div>
                            <div class="status-detail">Event: ${data.technicalEvent || 'N/A'}</div>
                        `;
                        scanAgainBtn.style.display = 'inline-block';
                    } else {
                        await updateDoc(docRef, { checkedIn: true });
                        playBeep('success');
                        scanCountNum++;
                        document.getElementById('scanCount').textContent = `Scanned: ${scanCountNum}`;
                        statusBox.classList.add('success');
                        statusBox.innerHTML = `
                            <div class="status-icon">✅</div>
                            <div class="status-name">ACCESS GRANTED</div>
                            <div class="status-detail"><b>${data.teamLead}</b></div>
                            <div class="status-detail">ID: ${cleanId}</div>
                            <div class="status-detail">Event: ${data.technicalEvent || 'N/A'}</div>
                            <div class="status-detail" style="margin-top:10px;color:var(--success)">Successfully checked in!</div>
                        `;
                        scanAgainBtn.style.display = 'inline-block';
                    }
                } else {
                    playBeep('error');
                    statusBox.classList.add('error');
                    statusBox.innerHTML = `
                        <div class="status-icon">❌</div>
                        <div class="status-name">INVALID ID</div>
                        <div class="status-detail">Not found in database</div>
                        <div class="status-detail">ID: ${cleanId}</div>
                    `;
                    scanAgainBtn.style.display = 'inline-block';
                }
            } catch (err) {
                console.error(err);
                playBeep('error');
                statusBox.innerHTML = `
                    <div class="status-icon">⚠️</div>
                    <div class="status-name">CONNECTION ERROR</div>
                    <div class="status-detail">Could not connect to database</div>
                `;
                scanAgainBtn.style.display = 'inline-block';
            }

            stopScanner();
        }

        window.scanAnother = () => {
            lastScannedId = null;
            document.getElementById('statusBox').style.display = 'none';
            document.getElementById('scanAgainBtn').style.display = 'none';
            document.getElementById('manualId').value = '';
            startScanner();
        };

        window.checkManual = () => {
            const id = document.getElementById('manualId').value;
            if (id) verifyEntry(id);
        };

        startScanner();
    </script>
</body>
</html>
